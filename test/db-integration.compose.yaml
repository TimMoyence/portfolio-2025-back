services:
  db-integration:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio_2025_ci
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '55432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d portfolio_2025_ci']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_integration_data:/var/lib/postgresql/data

volumes:
  db_integration_data:
